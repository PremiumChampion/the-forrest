# configure language supprot and functions
CONFIG_CPP=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_STD_CPP20=y
CONFIG_REQUIRES_FULL_LIBC=y

# CONFIG_SERIAL=y

# configuring uart
CONFIG_UART_0_ENABLE=y
CONFIG_UART_1_ENABLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_USE_RUNTIME_CONFIGURE=y
CONFIG_APP_USE_NRF_RETENTION=y
CONFIG_APP_USE_RETAINED_MEM=y
CONFIG_CRC=y

# enable uart for measuring power consumption and waking modules up
CONFIG_GPIO=y
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_POWEROFF=y

# enable i2c for communication with real time clock
CONFIG_I2C=y

# we enable poll for working with uart
# this allows for efficient use of message queues
CONFIG_POLL=y

# configure the default stack size
# wee store most data on the stack
CONFIG_MAIN_STACK_SIZE=4096

# configure available time functions
CONFIG_POSIX_CLOCK=y

# configure logging via rtt
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_PRINTK=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_UART_CONSOLE=n