<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Iframes Side by Side</title>
    <style>
        .container {
            display: flex;
            justify-content: space-between;
            margin: 20px;
        }
        iframe {
            background: #FFFFFF;
            border: none;
            border-radius: 2px;
            box-shadow: 0 2px 10px 0 rgba(70, 76, 79, .2);
            width: 640px;
            height: 480px;
            margin: 0 10px; /* Optional: adds space between iframes */
        }
    </style>
</head>
<body>

<div class="container">
    <iframe src="https://charts.mongodb.com/charts-project-0-kgbwnwv/embed/charts?id=1dc1c0f8-cbb6-4410-a2b9-9a7781d73a8c&maxDataAge=60&theme=light&autoRefresh=true"></iframe>
    <iframe src="https://charts.mongodb.com/charts-project-0-kgbwnwv/embed/charts?id=a5795728-6307-4fa9-a08c-ef217c421594&maxDataAge=60&theme=light&autoRefresh=true"></iframe>
</div>

</body>
</html>
